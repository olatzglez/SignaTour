services:
  postgres:
    image: postgres:16
    container_name: itinerarios_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: itinerarios
      POSTGRES_PASSWORD: olatz1234
      POSTGRES_DB: itinerarios
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: itinerarios_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: